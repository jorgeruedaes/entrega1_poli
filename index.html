<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PoliMarket Entrega 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">
  <h2 class="text-center mb-4">PoliMarket SAAS</h2>

  <div class="row">
      <div class="col-md-4">
  <div class="card p-3 shadow-sm">
    <h5>Consultar pedidos </h5>
    <button class="btn btn-dark w-100" onclick="consultarPedidos()">Consultar Pedidos</button>
    <div id="pedidosResult" class="mt-3"></div>
  </div>
</div>

    <div class="col-md-4">
      <div class="card p-3 shadow-sm">
        <h5> Gestionar inventario</h5>
        <input type="number" id="productIdApi" class="form-control my-2" placeholder="ID Producto">
        <input type="number" id="cantidad" class="form-control my-2" placeholder="Cantidad">
        <button class="btn btn-info w-100 mb-2" onclick="consultarInventario()">Consultar</button>
        <button class="btn btn-warning w-100" onclick="actualizarInventario()">Actualizar</button>
        <div id="inventarioResult" class="mt-2 text-center"></div>
      </div>
    </div>

  </div>

  <div class="mt-5">
    <h4>Listado de datos</h4>
    <ul id="listaDatos" class="list-group"></ul>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="app.js"></script>
</body>
</html>
